networks:
    rssforever:

services:
    # ---------------------------------------- rss ---------------------------------------- #
    service.rss:
        image: freshrss/freshrss:latest
        restart: always
        depends_on:
            - db
        ports:
            - 13829:80
        volumes:
            - ./freshrss-data:/var/www/FreshRSS/data
            - ./freshrss-extensions:/var/www/FreshRSS/extensions
        environment:
            CRON_MIN: '*/20'
            TZ: America/Los_Angeles
        networks:
            - rssforever

    db:
        image: postgres:13.14-alpine3.19
        restart: always
        volumes:
            - ./db:/var/lib/postgresql/data
        environment:
            POSTGRES_USER: freshrss
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freshrss}
            POSTGRES_DB: freshrss
        networks:
            - rssforever

    # ---------------------------------------- rsshub ---------------------------------------- #
    rsshub:
        image: diygod/rsshub:latest
        restart: always
        # ports:
        #     - 13828:13828
        environment:
            PORT: 13828
            NODE_ENV: production
            CACHE_TYPE: redis
            REDIS_URL: 'redis://redis:6379/'
            # PUPPETEER_WS_ENDPOINT: "ws://browserless:3000" # marked
            NODE_TLS_REJECT_UNAUTHORIZED: '0'
            FLARESOLVERR_URL: 'http://trawl:8191'
        depends_on:
            - redis
            - trawl
            # - browserless # marked
        networks:
            - rssforever
        volumes:
            - .:/app
        command: npm run start
        # command: npm run dev:cache

    trawl:
        image: ghcr.io/germondai/trawl:latest
        ports:
            - '8191:8191'
        shm_size: 1gb
        environment:
            REDIS_URL: redis://redis:6379
            BROWSER_POOL_SIZE: 1
        depends_on:
            - redis
        healthcheck:
            test: ['CMD', 'curl', '-sf', 'http://localhost:8191/health']
            interval: 60s
            timeout: 10s
            retries: 3
            start_period: 90s
        restart: always
        networks:
            - rssforever

    redis:
        image: redis:alpine
        restart: always
        environment:
            - TZ=America/Los_Angeles
        volumes:
            - ./redis-data:/data
        networks:
            - rssforever

    # ---------------------------------------- watchtower ---------------------------------------- #
    # 每天早上 6 点定时更新 RSSHub , 如无需可注释或删除本段.
    watchtower:
        image: containrrr/watchtower:latest
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        environment:
            - TZ=America/Los_Angeles
            - WATCHTOWER_CLEANUP=true
            - WATCHTOWER_SCHEDULE=0 0 6 * * *
        restart: always
        command: rsshub-watchtower-1 rsshub-rsshub-1 rsshub-service.rss-1 rsshub-redis-1 rsshub-trawl-1
        networks:
            - rssforever
